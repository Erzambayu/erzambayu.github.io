name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    name: Validate HTML & check links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install validators
        run: npm install --no-save html-validate@^8 linkinator@^6

      - name: HTML validate
        run: npx html-validate "index.html"

      - name: Link check (ignore external flaky hosts)
        run: >-
          npx linkinator "index.html"
          --skip "^https?://(images\\.unsplash\\.com|cdn\\.jsdelivr\\.net|unpkg\\.com|fonts\\.(googleapis|gstatic)\\.com|www\\.google\\.com/maps|formspree\\.io)"
          --silent
